<!--frontend/pages/lobby.html-->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby - Go Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/lobby.css">
</head>
<body>
    <div class="lobby-container">
        <header class="lobby-header">
            <h1>🎮 Go Game Lobby</h1>
            <div class="user-info">
                <span id="currentUser"></span>
                <button id="logoutBtn" class="btn-logout">Đăng Xuất</button>
            </div>
        </header>
        
        <div class="lobby-content">
            <div class="lobby-actions">
                <button id="createRoomBtn" class="btn-create-room">+ Tạo Phòng Mới</button>
                <button id="refreshBtn" class="btn-refresh">🔄 Làm Mới</button>
            </div>
            
            <div class="rooms-section">
                <h2>Danh Sách Phòng</h2>
                <div id="roomsList" class="rooms-list">
                    <!-- Rooms will be rendered here -->
                </div>
                <div id="emptyMessage" class="empty-message">
                    Chưa có phòng nào. Hãy tạo phòng mới!
                </div>
            </div>
        </div>
    </div>
    
    <!-- Create Room Modal -->
    <div id="createRoomModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Tạo Phòng Mới</h2>
            <form id="createRoomForm">
                <div class="form-group">
                    <label for="roomName">Tên phòng:</label>
                    <input type="text" id="roomName" required maxlength="30">
                </div>
                <div class="form-group">
                    <label for="boardSize">Kích thước bàn cờ:</label>
                    <select id="boardSize">
                        <option value="9">9×9</option>
                        <option value="13">13×13</option>
                        <option value="19" selected>19×19</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">Tạo Phòng</button>
            </form>
        </div>
    </div>
    
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="../scripts/lobby.js"></script>
</body>
</html>
